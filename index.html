<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="प्राची & योगेश विवाह निमंत्रण">
    <meta property="og:description" content="आपण आमच्या विवाह सोहळ्यास सादर निमंत्रित आहात. आपले वैयक्तिक निमंत्रण पाहण्यासाठी क्लिक करा.">

    <meta property="og:image" content="https://weddings-card.vercel.app/img2.jpeg?v=2">
    <meta property="og:image:secure_url" content="https://weddings-card.vercel.app/img2.jpeg?v=2">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta property="og:url" content="https://weddings-card.vercel.app/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stack-container">
        
        <!-- SECTION 1: Sanjay Image (Personalized Guest Name) -->
        <section class="stack-section active" data-section="1">
            <div class="stack-content">
                <div class="image-container">
                    <img src="img1.jpeg" alt="img" class="stack-image">
                    <!-- Hero title with personalized guest name -->
                    <h1 class="hero-title" id="guestName">संजय तुकाराम धागे </h1>
                </div>
            </div>
        </section>

        <!-- SECTION 2: Wedding Couple Image -->
        <section class="stack-section"  id="2">
            <div class="stack-content">
                <div class="image-container">
                    <img src="img2.jpeg" alt="Wedding Couple" class="stack-image">
                </div>
            </div>
        </section>

        <!-- SECTION 3: Haldi Venue -->
        <section class="stack-section" id="three" data-section="3">
            <div class="stack-content">
                <div class="venue-card haldi-card">
                    <div class="venue-header">
                        <span class="divider">❉------------❉</span>
                        <h2 class="venue-title">हळदी <span>स्थळ</span></h2>
                    </div>
                    <div class="map-container">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1930059.5429739254!2d72.73378032565759!3d19.123112024698735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc35700649649d1%3A0x39ca9f5a3ee0cc7c!2sShreya%20Collecion!5e0!3m2!1sen!2sin!4v1776744474122!5m2!1sen!2sin" 
                                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Haldi Location"></iframe>
                    </div>
                    <div class="venue-info">
                        <p>आमच्या निवासस्थानी</p>
                        <a href="https://maps.app.goo.gl/sEpbFYuquGjhxc2U8" target="_blank" class="direction-btn gold-btn">
                            येथून रस्ता पहा (Live Route)
                        </a>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECTION 4: Wedding Venue -->
        <section class="stack-section" id="four" data-section="4">
            <div class="stack-content">
                <div class="venue-card wedding-card">
                    <div class="venue-header">
                        <span class="divider">❉------------❉</span>
                        <h2 class="venue-title">विवाह <span>स्थळ</span></h2>
                    </div>
                    <div class="map-container">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3819.845123456789!2d74.24567891234567!3d19.07654321098765!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2c8f5a3ee0cc7c%3A0x1234567890abcdef!2sPadmavati+Mangal+Karyalay+Lawns+Nimgaon!5e0!3m2!1sen!2sin!4v1730000000000!5m2!1sen!2sin" 
                                style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Wedding Location"></iframe>
                    </div>
                    <div class="venue-info">
                        <p>पद्मावती मंगल कार्यालय & लॉन्स</p>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=Padmavati+Mangal+Karyalay+Lawns+Nimgaon" target="_blank" class="direction-btn gold-btn">
                            येथून रस्ता पहा (Live Route)
                        </a>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
